<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#04060a"/>
  <rect x="0" y="0" width="512" height="4" fill="#00e5ff" opacity="0.6"/>
  <rect x="0" y="508" width="512" height="4" fill="#00e5ff" opacity="0.6"/>
  <rect x="0" y="0" width="4" height="512" fill="#00e5ff" opacity="0.6"/>
  <rect x="508" y="0" width="4" height="512" fill="#00e5ff" opacity="0.6"/>
  <!-- Corner cuts -->
  <polygon points="0,0 60,0 0,60" fill="#00e5ff" opacity="0.7"/>
  <polygon points="512,0 452,0 512,60" fill="#00e5ff" opacity="0.7"/>
  <polygon points="0,512 60,512 0,452" fill="#39ff90" opacity="0.6"/>
  <polygon points="512,512 452,512 512,452" fill="#9b59ff" opacity="0.5"/>
  <!-- PLAMOX text -->
