  <text x="256" y="430" font-family="Arial, sans-serif" font-size="24" fill="#445566" text-anchor="middle" letter-spacing="4">THE WORLD</text>
  <!-- Glow line -->
  <line x1="100" y1="460" x2="412" y2="460" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
